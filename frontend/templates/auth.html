{% extends "layout.html" %}

{% block title %}Authentication Hub | Nexora{% endblock %}

{% block auth_content %}
<div class="auth-wrapper animate-in" style="width: 100%; max-width: 440px; padding: 20px;">
    <!-- Branding Header -->
    <header class="auth-branding" style="text-align: center; margin-bottom: 40px;">
        <div class="brand-logo" style="font-size: 2.8rem; font-weight: 850; letter-spacing: -2px; color: var(--text-main); margin-bottom: 5px;">
            NEXORA<span style="color: var(--primary);">AUTH</span>
        </div>
        <p class="text-muted" style="font-size: 0.75rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; opacity: 0.8;">Secure Gateway Protocol</p>
    </header>

    <div class="panel auth-panel" style="padding: 0; overflow: hidden; border: 1px solid var(--panel-border); background: var(--panel-white);">
        <!-- Tab Selector -->
        <nav class="auth-tabs" style="display: flex; background: var(--bg-light); border-bottom: 1px solid var(--panel-border);">
            <button onclick="switchTab('login')" id="login-tab" class="auth-tab active" style="flex: 1; padding: 20px; background: none; border: none; color: var(--text-main); font-weight: 850; cursor: pointer; transition: 0.3s; font-size: 0.85rem; letter-spacing: 1px;">LOGIN</button>
            <button onclick="switchTab('register')" id="register-tab" class="auth-tab" style="flex: 1; padding: 20px; background: none; border: none; color: var(--text-muted); font-weight: 850; cursor: pointer; transition: 0.3s; font-size: 0.85rem; letter-spacing: 1px;">REGISTER</button>
        </nav>

        <div class="auth-body" style="padding: 35px 30px;">
            <!-- Login Form (Two-Step) -->
            <form id="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div id="login-step-1">
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">Access Identity</label>
                        <input type="text" name="mobile" id="login-mobile" placeholder="Email or Mobile" required
                               style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 15px; border-radius: 12px; font-size: 1.1rem; outline: none; transition: 0.3s; font-weight: 600;">
                    </div>
                    <button type="button" onclick="verifyMobile()" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 0.95rem;">Initiate Scan</button>
                </div>

                <div id="login-step-2" style="display: none;" class="animate-in">
                    <div class="verified-badge" style="margin-bottom: 20px; padding: 12px 15px; background: rgba(59, 130, 246, 0.05); border-radius: 10px; border: 1px solid var(--primary); display: flex; justify-content: space-between; align-items: center;">
                        <span id="verified-mobile" style="font-weight: 700; color: var(--primary); font-size: 0.9rem;"></span>
                        <button type="button" onclick="resetLogin()" style="background: none; border: none; color: var(--text-muted); font-size: 0.65rem; cursor: pointer; text-decoration: underline; font-weight: 700;">Change</button>
                    </div>
                    <div class="form-group" style="margin-bottom: 25px;">
                        <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px;">Security Key</label>
                        <input type="password" name="password" id="login-password" placeholder="••••••••" required
                               style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 15px; border-radius: 12px; font-size: 1.1rem; outline: none; transition: 0.3s;">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; background: var(--secondary); box-shadow: 0 10px 20px -5px rgba(16,185,129,0.2); font-size: 0.95rem;">Enter Nexus</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" method="POST" action="{{ url_for('auth.register') }}" style="display: none;">
                <div class="form-group" style="margin-bottom: 18px;">
                    <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Full Identity</label>
                    <input type="text" name="name" placeholder="User Name" required
                           style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 12px 15px; border-radius: 10px; font-weight: 600;">
                </div>
                <div class="form-group" style="margin-bottom: 18px;">
                    <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Communication Node (Email)</label>
                    <input type="email" name="email" placeholder="email@nexora.com" required
                           style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 12px 15px; border-radius: 10px; font-weight: 600;">
                </div>
                <div class="form-group" style="margin-bottom: 18px;">
                    <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px;">Mobile Contact</label>
                    <input type="tel" name="mobile" placeholder="+91 00000 00000" required
                           style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 12px 15px; border-radius: 10px; font-weight: 600;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px;">
                    <div class="form-group">
                        <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Key</label>
                        <input type="password" name="password" id="reg-pass" placeholder="••••" required
                               style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 12px; border-radius: 10px;">
                    </div>
                    <div class="form-group">
                        <label class="form-label" style="display: block; color: var(--text-muted); font-size: 0.65rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Verify</label>
                        <input type="password" name="confirm_password" id="reg-confirm" placeholder="••••" required
                               style="width: 100%; background: var(--bg-light); border: 1px solid var(--panel-border); color: var(--text-main); padding: 12px; border-radius: 10px;">
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 16px; font-size: 0.95rem;">Generate Identity</button>
            </form>

            <!-- Social Login Separator -->
            <div style="margin: 25px 0; display: flex; align-items: center; gap: 15px;">
                <div style="flex: 1; height: 1px; background: var(--panel-border);"></div>
                <span style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: lowercase;">or continue with</span>
                <div style="flex: 1; height: 1px; background: var(--panel-border);"></div>
            </div>

            <!-- Google Login Button -->
            <a href="{{ url_for('auth.google_login') }}" class="btn-primary" style="background: white; color: var(--text-main); border: 1px solid var(--panel-border); width: 100%; display: flex; justify-content: center; align-items: center; gap: 12px; padding: 15px; font-size: 0.9rem; text-decoration: none; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); transition: 0.3s;" onmouseover="this.style.background='var(--bg-light)'" onmouseout="this.style.background='white'">
                <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" style="width: 20px; height: 20px;">
                <span>Sign in with Google</span>
            </a>
        </div>
    </div>
</div>

<style>
    .auth-tab.active { 
        background: rgba(59, 130, 246, 0.08) !important; 
        color: var(--primary) !important; 
        border-bottom: 2px solid var(--primary) !important; 
    }
    .auth-tab:hover { background: rgba(255,255,255,0.04); }
    input:focus {
        border-color: var(--primary) !important;
        box-shadow: 0 0 0 2px var(--primary-glow);
    }
</style>

<script>
function switchTab(tab) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');

    if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
    } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
    }
}

async function verifyMobile() {
    const rawIdentifier = document.getElementById('login-mobile').value;
    if (!rawIdentifier) return showToast("Identification required", "warning");

    AppLoader.show("SCANNING NODE...");

    try {
        const res = await fetch('/api/check-mobile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile: rawIdentifier })
        });
        const data = await res.json();
        
        if (data.exists) {
            document.getElementById('login-step-1').style.display = 'none';
            document.getElementById('login-step-2').style.display = 'block';
            document.getElementById('verified-mobile').innerText = rawIdentifier;
            AppLoader.hide();
        } else {
            showToast("Node not found", "warning");
            AppLoader.hide();
        }
    } catch(e) {
        showToast("Signal Interrupted", "warning");
        AppLoader.hide();
    }
}

// Mobile Formatter Logic
function formatMobileInput(e) {
    let value = e.target.value;
    if (value.includes('@')) return; // Don't format if it looks like an email

    value = value.replace(/\D/g, '');
    if (value.length > 5) {
        value = value.slice(0, 5) + ' ' + value.slice(5, 10);
    }
    e.target.value = value.trim();
}

document.getElementById('login-mobile').addEventListener('input', formatMobileInput);
document.querySelectorAll('input[name="mobile"]').forEach(input => {
    input.addEventListener('input', formatMobileInput);
});

function resetLogin() {
    document.getElementById('login-step-1').style.display = 'block';
    document.getElementById('login-step-2').style.display = 'none';
}

document.getElementById('register-form').onsubmit = function(e) {
    const pass = document.getElementById('reg-pass').value;
    const confirm = document.getElementById('reg-confirm').value;
    if (pass !== confirm) {
        showToast("Keys do not match!", "warning");
        e.preventDefault();
        return false;
    }
    AppLoader.show("ENCRYPTING IDENTITY...");
    return true;
};
</script>
{% endblock %}
