{% extends "layout.html" %}

{% block title %}Authentication Hub | Nexora{% endblock %}

{% block auth_content %}
<div class="auth-container animate-in" style="width: 100%; max-width: 480px; margin-top: 60px;">
    <!-- Branding Header -->
    <div style="text-align: center; margin-bottom: 40px;">
        <div style="font-size: 2.5rem; font-weight: 850; letter-spacing: -2px; color: #fff;">
            NEXORA<span style="color: var(--primary);">AUTH</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.85rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase;">Secure Gateway Control</p>
    </div>

    <div class="panel" style="padding: 0; overflow: hidden; border: 1px solid var(--border-bright);">
        <!-- Tab Selector -->
        <div style="display: flex; border-bottom: 1px solid var(--border);">
            <button onclick="switchTab('login')" id="login-tab" class="auth-tab active" style="flex: 1; padding: 20px; background: none; border: none; color: #fff; font-weight: 850; cursor: pointer; transition: 0.3s; font-size: 0.9rem;">LOGIN</button>
            <button onclick="switchTab('register')" id="register-tab" class="auth-tab" style="flex: 1; padding: 20px; background: none; border: none; color: var(--text-muted); font-weight: 850; cursor: pointer; transition: 0.3s; font-size: 0.9rem;">REGISTER</button>
        </div>

        <div style="padding: 40px;">
            <!-- Login Form (Two-Step) -->
            <form id="login-form" method="POST" action="{{ url_for('auth.login') }}">
                <div id="login-step-1">
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Mobile Number</label>
                        <input type="text" name="mobile" id="login-mobile" placeholder="+91 00000 00000" required
                               style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;">
                    </div>
                    <button type="button" onclick="verifyMobile()" class="btn-primary" style="width: 100%; justify-content: center; padding: 15px;">Continue</button>
                </div>

                <div id="login-step-2" style="display: none;" class="animate-in">
                    <div style="margin-bottom: 15px; padding: 15px; background: rgba(59, 130, 246, 0.1); border-radius: 12px; border: 1px solid var(--primary); display: flex; align-items: center; gap: 12px;">
                        <span id="verified-mobile" style="font-weight: 700; color: var(--primary);"></span>
                        <button type="button" onclick="resetLogin()" style="background: none; border: none; color: var(--text-muted); font-size: 0.7rem; cursor: pointer; text-decoration: underline;">Change</button>
                    </div>
                    <div style="margin-bottom: 25px;">
                        <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Security Password</label>
                        <input type="password" name="password" id="login-password" placeholder="••••••••" required
                               style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;">
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 15px; background: var(--secondary);">Enter Nexus</button>
                </div>
            </form>

            <!-- Register Form -->
            <form id="register-form" method="POST" action="{{ url_for('auth.register') }}" style="display: none;">
                <div style="margin-bottom: 20px;">
                    <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Full Name</label>
                    <input type="text" name="name" placeholder="Hemanth Reddy" required
                           style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Email ID</label>
                    <input type="email" name="email" placeholder="hemanth@nexora.com" required
                           style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;">
                </div>
                <div style="margin-bottom: 20px;">
                    <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Mobile (10 Digits)</label>
                    <input type="text" name="mobile" placeholder="+91 00000 00000" required
                           style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px;">
                    <div>
                        <label style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Password</label>
                        <input type="password" name="password" id="reg-pass" placeholder="••••••••" required
                               style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;">
                    </div>
                    <div>
                        <label style="display: block; color: var(--text-muted); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Confirm</label>
                        <input type="password" name="confirm_password" id="reg-confirm" placeholder="••••••••" required
                               style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 12px; border-radius: 10px; box-sizing: border-box;">
                    </div>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 15px;">Create Secure Account</button>
            </form>
        </div>
    </div>
</div>

<style>
    .auth-tab.active { background: rgba(59, 130, 246, 0.05) !important; color: var(--primary) !important; border-bottom: 3px solid var(--primary) !important; }
    .auth-tab:hover { background: rgba(255,255,255,0.02); }
</style>

<script>
function switchTab(tab) {
    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const loginTab = document.getElementById('login-tab');
    const registerTab = document.getElementById('register-tab');

    if (tab === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        loginTab.classList.add('active');
        registerTab.classList.remove('active');
    } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        loginTab.classList.remove('active');
        registerTab.classList.add('active');
    }
}

async function verifyMobile() {
    const mobile = document.getElementById('login-mobile').value;
    if (!mobile) return showToast("Enter mobile number", "warning");

    AppLoader.show("SCANNING MATRIX...");

    try {
        const res = await fetch('/api/check-mobile', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mobile: mobile })
        });
        const data = await res.json();
        
        if (data.exists) {
            document.getElementById('login-step-1').style.display = 'none';
            document.getElementById('login-step-2').style.display = 'block';
            document.getElementById('verified-mobile').innerText = mobile;
            AppLoader.hide();
        } else {
            showToast("Enter correct mobile number", "warning");
            AppLoader.hide();
        }
    } catch(e) {
        showToast("Connection Interrupted", "warning");
        AppLoader.hide();
    }
}

function resetLogin() {
    document.getElementById('login-step-1').style.display = 'block';
    document.getElementById('login-step-2').style.display = 'none';
}

document.getElementById('register-form').onsubmit = function(e) {
    const pass = document.getElementById('reg-pass').value;
    const confirm = document.getElementById('reg-confirm').value;
    if (pass !== confirm) {
        showToast("Passwords do not match!", "warning");
        e.preventDefault();
        return false;
    }
    AppLoader.show("ENCRYPTING IDENTITY...");
    return true;
};
</script>
{% endblock %}
