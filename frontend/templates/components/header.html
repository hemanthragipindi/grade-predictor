<!-- Header Component -->
<header class="top-header">
    <div class="greeting-bar" style="display: flex; align-items: center; gap: 15px;">
        <div class="time-greeting" style="font-weight: 800; color: var(--text-main); font-size: 1.1rem; letter-spacing: -0.5px;">
            {% if current_hour < 12 %}Good Morning{% elif current_hour < 17 %}Good Afternoon{% else %}Good Evening{% endif %}, {{ current_user.name.split()[0] }}
        </div>
        <div class="streak-badge" style="background: rgba(134, 239, 172, 0.1); color: var(--grade-o); padding: 4px 10px; border-radius: 12px; font-size: 0.75rem; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 0 10px rgba(134, 239, 172, 0.05);">
            🔥 5 Day Streak
        </div>
    </div>
    
    <div class="header-icons" style="margin-left: auto; display: flex; align-items: center; gap: 16px;">
        <div class="search-bar" style="margin-right: 10px;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" placeholder="Search parameters...">
        </div>
        <button class="icon-btn" title="Notifications" style="position:relative; background:transparent; border:none; cursor:pointer; color:var(--text-muted); padding:0; display:flex; align-items:center;">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
        </button>
    </div>
</header>
