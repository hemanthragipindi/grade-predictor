<!-- Header Component -->
<header class="top-header" style="padding: 20px 24px; display: flex; align-items: center; border-bottom: 1px solid var(--panel-border); background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);">
    <div class="greeting-bar" style="display: flex; align-items: center; gap: 12px;">
        <div class="time-greeting" style="font-weight: 850; color: var(--text-main); font-size: 1.1rem; letter-spacing: -0.5px;">
            {% if current_hour < 12 %}Good Morning{% elif current_hour < 17 %}Good Afternoon{% else %}Good Evening{% endif %}, {{ current_user.name.split()[0] }}
        </div>
        <div class="streak-badge mobile-hide" style="background: rgba(16, 185, 129, 0.1); color: var(--grade-o); padding: 4px 10px; border-radius: 100px; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; gap: 6px; border: 1px solid rgba(16, 185, 129, 0.2);">
            <span style="font-size: 0.9rem;">🔥</span> 5 DAY STREAK
        </div>
    </div>
    
    <div class="header-actions" style="margin-left: auto; display: flex; align-items: center; gap: 20px;">
        <div class="search-container desktop-only" style="position: relative; display: flex; align-items: center;">
            <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="position: absolute; left: 12px; color: var(--text-muted);"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            <input type="text" placeholder="Search parameters..." style="background: rgba(255,255,255,0.03); border: 1px solid var(--panel-border); color: white; padding: 10px 15px 10px 38px; border-radius: 10px; font-size: 0.85rem; width: 220px; outline: none; transition: 0.3s;">
        </div>
        <button class="notification-btn" title="Notifications" style="position:relative; background:transparent; border:none; cursor:pointer; color:var(--text-muted); padding:0; display:flex; align-items:center; transition: 0.3s;">
            <svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path></svg>
            <span style="position: absolute; top: 2px; right: 2px; width: 8px; height: 8px; background: var(--grade-f); border-radius: 50%; border: 2px solid #0f172a;"></span>
        </button>
    </div>
</header>

<style>
@media (max-width: 600px) {
    .mobile-hide { display: none !important; }
    .desktop-only { display: none !important; }
}
.notification-btn:hover { color: var(--text-main); transform: scale(1.1); }
</style>
