<!-- AI Chatbot Component -->
<div id="nexora-chat" style="position: fixed; bottom: 30px; right: 30px; z-index: 1000;">
    <!-- Chat Button -->
    <button onclick="toggleChat()" id="chat-toggle" style="width: 60px; height: 60px; border-radius: 50%; background: var(--primary); border: none; color: white; cursor: pointer; box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4); display: flex; align-items: center; justify-content: center; transition: 0.3s;">
        <svg width="28" height="28" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" style="display: none; position: absolute; bottom: 80px; right: 0; width: 350px; height: 500px; background: var(--panel-dark); border-radius: 20px; border: 1px solid var(--border-bright); box-shadow: 0 20px 50px rgba(0,0,0,0.3); flex-direction: column; overflow: hidden;">
        <div style="background: var(--primary); padding: 20px; color: white; font-weight: 800; display: flex; justify-content: space-between;">
            <span>NEXORA AI ADVISOR</span>
            <button onclick="toggleChat()" style="background: none; border: none; color: white; cursor: pointer;">×</button>
        </div>
        <div id="chat-messages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px;">
            <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; font-size: 0.85rem; max-width: 85%;">
                Greetings. I am Nexora. How can I optimize your academic strategy today?
            </div>
        </div>
        <div style="padding: 15px; border-top: 1px solid var(--border);">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="chat-input" placeholder="Ask about your grades..." style="flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 10px; outline: none;">
                <button onclick="sendMessage()" style="background: var(--primary); border: none; color: white; padding: 10px; border-radius: 10px; cursor: pointer;">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                </button>
            </div>
        </div>
    </div>
</div>

<script>
function toggleChat() {
    const win = document.getElementById('chat-window');
    win.style.display = win.style.display === 'none' ? 'flex' : 'none';
}

async function sendMessage() {
    const input = document.getElementById('chat-input');
    const msg = input.value;
    if (!msg) return;

    const chatMessages = document.getElementById('chat-messages');
    
    // Add user message
    const userDiv = document.createElement('div');
    userDiv.style = "background: var(--primary); padding: 12px; border-radius: 12px; font-size: 0.85rem; max-width: 85%; align-self: flex-end; color: white;";
    userDiv.innerText = msg;
    chatMessages.appendChild(userDiv);
    
    input.value = "";
    chatMessages.scrollTop = chatMessages.scrollHeight;

    // Call API
    try {
        const res = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        });
        const data = await res.json();
        
        // Add AI response
        const aiDiv = document.createElement('div');
        aiDiv.style = "background: rgba(255,255,255,0.05); padding: 12px; border-radius: 12px; font-size: 0.85rem; max-width: 85%;";
        aiDiv.innerText = data.response;
        chatMessages.appendChild(aiDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    } catch(e) {
        console.error(e);
    }
}
</script>
