{% extends "layout.html" %}

{% block title %}Master Admin Login | Nexora{% endblock %}

{% block auth_content %}
<div class="auth-container animate-in" style="width: 100%; max-width: 450px; margin-top: 80px;">
    <div style="text-align: center; margin-bottom: 40px;">
        <div style="font-size: 2rem; font-weight: 900; color: #fff;">
            ADMIN<span style="color: var(--grade-f);">COMMAND</span>
        </div>
        <p style="color: var(--text-muted); font-size: 0.75rem; font-weight: 800; letter-spacing: 2px;">SECURE MASTER ACCESS</p>
    </div>

    <div class="panel" style="border: 1px solid var(--grade-f);">
        <form method="POST">
            <div style="margin-bottom: 25px;">
                <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Master Username</label>
                <input type="text" name="username" placeholder="ragipindihemanth" required
                       style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;">
            </div>
            <div style="margin-bottom: 30px;">
                <label style="display: block; color: var(--text-muted); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px;">Master Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required
                       style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--border); color: white; padding: 15px; border-radius: 12px; font-size: 1rem; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 15px; background: var(--grade-f);">INITIALIZE MASTER SESSION</button>
        </form>
    </div>
</div>
{% endblock %}
