{% extends "layout.html" %}

{% block title %}Admin Access | Nexora{% endblock %}

{% block content %}
<div class="container animate-in" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div class="panel" style="width: 100%; max-width: 400px; padding: 40px; border: 1px solid var(--grade-o); box-shadow: 0 0 30px rgba(16, 185, 129, 0.1);">
        
        <div style="text-align: center; margin-bottom: 30px;">
            <div class="brand-icon" style="width: 48px; height: 48px; margin: 0 auto 15px; background: var(--grade-o);">H</div>
            <h1 style="font-size: 1.5rem; font-weight: 850; margin: 0;">Admin Portal</h1>
            <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 5px;">Restricted Access Protocol</p>
        </div>

        <form method="POST" action="{{ url_for('admin.login') }}">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Admin Username</label>
                <input type="text" name="username" placeholder="ragipindihemanth" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-bright); color: #fff; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box;">
            </div>
            
            <div class="form-group" style="margin-bottom: 25px;">
                <label style="display: block; font-size: 0.7rem; color: var(--text-muted); font-weight: 800; text-transform: uppercase; margin-bottom: 8px;">Master Password</label>
                <input type="password" name="password" placeholder="••••••••" required style="width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-bright); color: #fff; padding: 12px; border-radius: 10px; outline: none; box-sizing: border-box;">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; padding: 14px; background: var(--grade-o);">Verify Identity</button>
            
            <a href="{{ url_for('auth.login') }}" style="display: block; text-align: center; color: var(--text-muted); font-size: 0.8rem; margin-top: 20px; text-decoration: none;">Return to Cadet Login</a>
        </form>
    </div>
</div>
{% endblock %}
