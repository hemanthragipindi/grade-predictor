name: Build Flutter APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'

      - name: Detect Flutter Project
        id: find_flutter
        run: |
          DIR=$(dirname $(find . -name pubspec.yaml | head -n 1))
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV
          echo "Detected Flutter dir: $DIR"

      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Build APK
        run: flutter build apk --release
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: nexora-apk
          path: ${{ env.FLUTTER_DIR }}/build/app/outputs/flutter-apk/app-release.apk
