name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          cache: true

      - name: Detect Flutter Project
        id: find_flutter
        run: |
          DIR=$(dirname $(find . -name pubspec.yaml | head -n 1))
          echo "FLUTTER_DIR=$DIR" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          flutter clean
          flutter pub get
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Build APK
        run: flutter build apk --release
        working-directory: ${{ env.FLUTTER_DIR }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'push'
        with:
          tag_name: v1.0.1
          name: Nexora Release v1.0.1
          files: ${{ env.FLUTTER_DIR }}/build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
