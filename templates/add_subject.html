{% extends 'layout.html' %}
{% block title %}Nexora | Add Course{% endblock %}
{% block content %}

<style>
    .page-title h1 {
        font-size: 1.8rem;
        font-weight: 800;
        margin: 0 0 24px 0;
        color: var(--text-main);
        letter-spacing: -0.5px;
    }
    
    .form-panel {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: var(--radius-lg);
        padding: 40px;
        box-shadow: var(--shadow-premium);
        max-width: 600px;
    }
    
    .form-group {
        margin-bottom: 24px;
    }
    label {
        display: block;
        font-size: 0.75rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 8px;
    }
    input[type="text"], input[type="number"], select {
        width: 100%;
        padding: 12px 16px;
        background: var(--bg-dark);
        border: 1px solid var(--border-bright);
        border-radius: var(--radius-sm);
        color: var(--text-main);
        font-size: 0.95rem;
        font-weight: 500;
        font-family: 'Inter', sans-serif;
        box-sizing: border-box;
        transition: border-color 0.2s;
    }
    input:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }
    
    .btn-submit {
        background: var(--primary);
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: var(--radius-sm);
        font-size: 0.95rem;
        font-weight: 700;
        cursor: pointer;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 8px;
        transition: opacity 0.2s;
    }
    .btn-submit:hover { background: var(--primary-hover); }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }
</style>

<div class="page-title animate-in">
    <h1>Initialize New Course</h1>
</div>

<div class="form-panel animate-in" style="animation-delay: 0.1s;">
    <form action="{{ url_for('add_subject') }}" method="POST">
        <div class="form-group">
            <label>Course Code</label>
            <input type="text" name="subject_code" placeholder="e.g. CSE326" required>
        </div>
        
        <div class="form-group">
            <label>Course Name</label>
            <input type="text" name="subject_name" placeholder="e.g. Internet Web Technologies" required>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label>Credits</label>
                <input type="number" name="credits" placeholder="e.g. 4" min="1" max="10" required>
            </div>
            <div class="form-group">
                <label>Semester</label>
                <input type="number" name="semester" placeholder="e.g. 2" min="1" max="10" required>
            </div>
        </div>
        
        <button type="submit" class="btn-submit">
            <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            Initialize Course Framework
        </button>
    </form>
</div>

{% endblock %}
