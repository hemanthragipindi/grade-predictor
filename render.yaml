services:
  - type: web
    name: grade-predictor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --log-level debug --bind 0.0.0.0:$PORT wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
      - key: SECRET_KEY
        generateValue: true
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_KEY
        sync: false
      - key: CLOUDINARY_SECRET
        sync: false
